services:

  postgres:
    image: postgres:17
    container_name: hastama-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: hastama
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data


volumes:
  postgres_data: